---
- name: Check if Claude Code is installed
  command: which claude
  register: claude_installed
  changed_when: false
  failed_when: false

- name: Get list of configured MCP servers
  command: claude mcp list
  register: mcp_list
  changed_when: false
  failed_when: false
  when: claude_installed.rc == 0

- name: Remove Peekaboo MCP server (replaced by CLI)
  command: claude mcp remove peekaboo -s user
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
    - "'peekaboo:' in mcp_list.stdout"
  register: peekaboo_remove_result
  changed_when: peekaboo_remove_result.rc == 0

- name: Reconfigure Playwright MCP server (add --output-dir)
  command: claude mcp remove playwright -s user
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
    - "'playwright:' in mcp_list.stdout"
    - "'output-dir' not in mcp_list.stdout"
  register: playwright_reconfig_result
  changed_when: playwright_reconfig_result.rc == 0

- name: Configure Playwright MCP server
  command: claude mcp add playwright -s user -- npx @playwright/mcp@latest --output-dir .playwright-mcp
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
    - "'playwright:' not in mcp_list.stdout or (playwright_reconfig_result is defined and playwright_reconfig_result is changed)"
  register: playwright_result
  changed_when: playwright_result.rc == 0

- name: Configure Context7 MCP server
  command: claude mcp add context7 -s user -- npx -y @upstash/context7-mcp@latest
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
    - "'context7:' not in mcp_list.stdout"
  register: context7_result
  changed_when: context7_result.rc == 0

- name: Configure Slack MCP server
  command: >
    claude mcp add slack -s user
    -e SLACK_MCP_XOXP_TOKEN={{ lookup('env', 'SLACK_MCP_XOXP_TOKEN') }}
    -e SLACK_MCP_ADD_MESSAGE_TOOL=true
    -e SLACK_MCP_MARK_TOOL=true
    -e SLACK_MCP_ENABLED_TOOLS=reactions_add,reactions_remove,channels_list,conversations_history,conversations_replies,conversations_add_message,conversations_mark,conversations_search_messages,users_search,usergroups_list,usergroups_me
    -- npx slack-mcp-server@latest
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
    - "'slack:' not in mcp_list.stdout"
    - lookup('env', 'SLACK_MCP_XOXP_TOKEN') != ''
  register: slack_result
  changed_when: slack_result.rc == 0

- name: Display Slack MCP skip notice
  debug:
    msg: >-
      Slack MCP was skipped because SLACK_MCP_XOXP_TOKEN is not set.
      To enable Slack MCP, run: export SLACK_MCP_XOXP_TOKEN="xoxp-..." && make mcp-update
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
    - "'slack:' not in mcp_list.stdout"
    - lookup('env', 'SLACK_MCP_XOXP_TOKEN') == ''

- name: Configure Confluence MCP server
  command: >
    claude mcp add confluence -s user
    -e CONFLUENCE_URL={{ lookup('env', 'CONFLUENCE_URL') }}
    -e CONFLUENCE_USERNAME={{ lookup('env', 'CONFLUENCE_USERNAME') }}
    -e CONFLUENCE_API_TOKEN={{ lookup('env', 'CONFLUENCE_API_TOKEN') }}
    -e TOOLSETS=confluence_pages,confluence_comments
    -- uvx mcp-atlassian
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
    - "'confluence:' not in mcp_list.stdout"
    - lookup('env', 'CONFLUENCE_URL') != ''
    - lookup('env', 'CONFLUENCE_USERNAME') != ''
    - lookup('env', 'CONFLUENCE_API_TOKEN') != ''
  register: confluence_result
  changed_when: confluence_result.rc == 0

- name: Display Confluence MCP skip notice
  debug:
    msg: >-
      Confluence MCP was skipped because CONFLUENCE_URL, CONFLUENCE_USERNAME, or CONFLUENCE_API_TOKEN is not set.
      To enable Confluence MCP, run: export CONFLUENCE_URL="https://your-company.atlassian.net/wiki" CONFLUENCE_USERNAME="your.email@company.com" CONFLUENCE_API_TOKEN="your_token" && make mcp-update
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
    - "'confluence:' not in mcp_list.stdout"
    - lookup('env', 'CONFLUENCE_URL') == '' or lookup('env', 'CONFLUENCE_USERNAME') == '' or lookup('env', 'CONFLUENCE_API_TOKEN') == ''

- name: Display MCP configuration results
  debug:
    msg: "MCP servers configured: playwright={{ 'already configured' if 'playwright:' in mcp_list.stdout else 'configured' }}, context7={{ 'already configured' if 'context7:' in mcp_list.stdout else 'configured' }}, slack={{ 'already configured' if 'slack:' in mcp_list.stdout else ('skipped (no token)' if lookup('env', 'SLACK_MCP_XOXP_TOKEN') == '' else 'configured') }}, confluence={{ 'already configured' if 'confluence:' in mcp_list.stdout else ('skipped (no credentials)' if lookup('env', 'CONFLUENCE_URL') == '' or lookup('env', 'CONFLUENCE_USERNAME') == '' or lookup('env', 'CONFLUENCE_API_TOKEN') == '' else 'configured') }}"
  when:
    - claude_installed.rc == 0
    - mcp_list.rc == 0
